name: рҹӣ пёҸ ImmortalWRT ESXi 8 Build with Dependency Fix

on:
  push:
    branches: ['main', 'master']
    paths:
      - '**.yml'
      - '**.yaml'
      - 'config/**'
      - 'scripts/**'
      - '!docs/**'

  workflow_dispatch:
    inputs:
      skip_dependency_check:
        description: 'и·іиҝҮдҫқиө–жЈҖжҹҘпјҲдёҚе»әи®®пјү'
        required: false
        default: 'false'

env:
  BUILD_THREADS: 8
  ESXI_VERSION: 8
  SKIP_DEP_CHECK: ${{ github.event.inputs.skip_dependency_check || 'false' }}

jobs:
  dependency-fix:
    runs-on: ubuntu-22.04
    outputs:
      build_id: ${{ steps.generate-id.outputs.build_id }}
      dep_status: ${{ steps.check-dependencies.outputs.dep_status }}
    steps:
      - name: рҹ“Ҙ жЈҖеҮәд»Јз Ғ
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: рҹҶ” з”ҹжҲҗжһ„е»әID
        id: generate-id
        run: echo "build_id=build_$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: рҹ”Қ жЈҖжҹҘдҫқиө–еҢ…зҠ¶жҖҒ
        id: check-dependencies
        run: |
          echo "жЈҖжҹҘзјәеӨұзҡ„дҫқиө–еҢ…..."
          # жЈҖжҹҘеёёи§ҒзјәеӨұзҡ„дҫқиө–еҢ…
          MISSING_DEPS=()
          
          # жЈҖжҹҘ libev зӣёе…і
          if ! pkg-config --exists libev; then
            echo "вқҢ libev ејҖеҸ‘еҢ…зјәеӨұ"
            MISSING_DEPS+=("libev")
          fi
          
          # жЈҖжҹҘ lm-sensors
          if ! dpkg -l | grep -q "lm-sensors"; then
            echo "вқҢ lm-sensors зјәеӨұ"
            MISSING_DEPS+=("lm-sensors")
          fi
          
          # жЈҖжҹҘ libpam
          if ! dpkg -l | grep -q "libpam0g-dev"; then
            echo "вқҢ libpam ејҖеҸ‘еҢ…зјәеӨұ"
            MISSING_DEPS+=("libpam")
          fi
          
          # жЈҖжҹҘ liblzma
          if ! dpkg -l | grep -q "liblzma-dev"; then
            echo "вқҢ liblzma ејҖеҸ‘еҢ…зјәеӨұ"
            MISSING_DEPS+=("liblzma")
          fi
          
          if [ ${#MISSING_DEPS[@]} -eq 0 ]; then
            echo "вң… жүҖжңүдҫқиө–еҢ…жӯЈеёё"
            echo "dep_status=ok" >> $GITHUB_OUTPUT
          else
            echo "вҡ пёҸ зјәеӨұдҫқиө–: ${MISSING_DEPS[*]}"
            echo "dep_status=missing:${MISSING_DEPS[*]}" >> $GITHUB_OUTPUT
          fi

  install-dependencies:
    needs: dependency-fix
    runs-on: ubuntu-22.04
    steps:
      - name: рҹ“Ұ е®үиЈ…зјәеӨұзҡ„дҫқиө–еҢ…
        run: |
          echo "е®үиЈ…еҝ…иҰҒзҡ„жһ„е»әдҫқиө–..."
          
          # еҹәзЎҖзј–иҜ‘е·Ҙе…·
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            gcc \
            g++ \
            libncurses5-dev \
            libncursesw5-dev \
            zlib1g-dev \
            gawk \
            git \
            gettext \
            libssl-dev \
            python3 \
            python3-distutils \
            rsync \
            unzip \
            wget \
            file \
            bc \
            jq \
            curl \
            aria2 \
            subversion
          
          # е®үиЈ…зјәеӨұзҡ„зү№е®ҡдҫқиө–:cite[1]:cite[9]
          echo "е®үиЈ…зү№е®ҡзјәеӨұдҫқиө–..."
          sudo apt-get install -y \
            libev-dev \
            lm-sensors \
            libpam0g-dev \
            liblzma-dev \
            libtirpc-dev \
            libnetsnmp-dev \
            libglib2.0-dev \
            libgpiod-dev \
            libdbus-1-dev \
            libmodbus-dev
          
          # жё…зҗҶзј“еӯҳ
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: рҹ§№ жё…зҗҶз©әй—ҙ
        run: |
          sudo apt-get autoremove -y
          sudo rm -rf /tmp/* /var/tmp/*
          df -h

  build-firmware:
    needs: [dependency-fix, install-dependencies]
    runs-on: ubuntu-22.04
    env:
      BUILD_DIR: /home/runner/work/immortalwrt-build
    steps:
      - name: рҹ“Ҙ е…ӢйҡҶImmortalWRT
        run: |
          mkdir -p $BUILD_DIR
          cd $BUILD_DIR
          git clone --depth=1 --single-branch \
            https://github.com/immortalwrt/immortalwrt.git immortalwrt-source
          
          cd immortalwrt-source
          echo "жәҗз ҒеӨ§е°Ҹ: $(du -sh .)"

      - name: рҹ”§ дҝ®еӨҚдҫқиө–й…ҚзҪ®
        run: |
          cd $BUILD_DIR/immortalwrt-source
          
          echo "дҝ®еӨҚMakefileдёӯзҡ„дҫқиө–й…ҚзҪ®..."
          
          # дҝ®еӨҚlibevдҫқиө–:cite[9]
          if grep -q "libev" package/utils/audit/Makefile 2>/dev/null; then
            sed -i 's/libev/libev-dev/' package/utils/audit/Makefile
            echo "вң… дҝ®еӨҚauditеҢ…libevдҫқиө–"
          fi
          
          # дҝ®еӨҚlm-sensorsдҫқиө–:cite[5]:cite[10]
          if grep -q "lm-sensors" package/emortal/autocore/Makefile 2>/dev/null; then
            sed -i 's/lm-sensors/lm-sensors/' package/emortal/autocore/Makefile
            echo "вң… дҝ®еӨҚautocoreеҢ…lm-sensorsдҫқиө–"
          fi
          
          # дҝ®еӨҚlibpamдҫқиө–:cite[6]:cite[8]
          for makefile in $(find . -name "Makefile" -exec grep -l "libpam" {} \;); do
            sed -i 's/libpam/libpam0g-dev/' "$makefile"
            echo "вң… дҝ®еӨҚ $makefile дёӯзҡ„libpamдҫқиө–"
          done
          
          # дҝ®еӨҚе…¶д»–еёёи§Ғдҫқиө–
          for makefile in $(find . -name "Makefile" -exec grep -l "liblzma\|libtirpc\|libnetsnmp" {} \;); do
            sed -i \
              -e 's/liblzma/liblzma-dev/' \
              -e 's/libtirpc/libtirpc-dev/' \
              -e 's/libnetsnmp/libnetsnmp-dev/' \
              "$makefile"
            echo "вң… дҝ®еӨҚ $makefile дёӯзҡ„дҫқиө–"
          done

      - name: вҡҷпёҸ з”ҹжҲҗдјҳеҢ–й…ҚзҪ®
        run: |
          cd $BUILD_DIR/immortalwrt-source
          
          # еҲӣе»әжңҖе°ҸеҢ–ESXiй…ҚзҪ®
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_VMDK_IMAGES=y
          
          # ж ёеҝғеҠҹиғҪ
          CONFIG_PACKAGE_vlmcsd=y
          CONFIG_PACKAGE_luci-app-vlmcsd=y
          
          # еӨ„зҗҶеҷЁдјҳеҢ–
          CONFIG_SMP=y
          CONFIG_NR_CPUS=16
          CONFIG_CPU_FREQ=y
          CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y
          
          # зҪ‘з»ңдјҳеҢ–
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_DEFAULT_BBR=y
          CONFIG_TCP_CONG_BBR=y
          
          # иҷҡжӢҹеҢ–й©ұеҠЁ
          CONFIG_PACKAGE_kmod-vmxnet3=y
          CONFIG_PACKAGE_kmod-virtio-net=y
          CONFIG_PACKAGE_kmod-virtio-blk=y
          
          # еҝ…иҰҒе·Ҙе…·
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_iperf3=y
          
          # жҖ§иғҪи°ғдјҳ
          CONFIG_KERNEL_HZ=1000
          CONFIG_DEBUG_INFO=n
          CONFIG_DEBUG_KERNEL=n
          
          # зҰҒз”Ёжңүй—®йўҳзҡ„еҢ…:cite[2]:cite[3]
          # CONFIG_PACKAGE_policycoreutils is not set
          # CONFIG_PACKAGE_lldpd is not set
          # CONFIG_PACKAGE_wsdd2 is not set
          # CONFIG_PACKAGE_glib2 is not set
          EOF
          
          make defconfig
          echo "вң… й…ҚзҪ®е®ҢжҲҗ"

      - name: рҹҸ—пёҸ зј–иҜ‘еӣәд»¶
        run: |
          cd $BUILD_DIR/immortalwrt-source
          
          # и®ҫзҪ®зј–иҜ‘зҺҜеўғ
          export CFLAGS="-Os -pipe"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-Wl,-O1 -Wl,--as-needed"
          
          echo "ејҖе§Ӣзј–иҜ‘..."
          
          # еҲҶйҳ¶ж®өзј–иҜ‘д»ҘеҮҸе°‘еҶ…еӯҳдҪҝз”Ё:cite[6]
          make tools/install -j$BUILD_THREADS
          make toolchain/install -j$BUILD_THREADS
          make target/linux/install -j$BUILD_THREADS
          make package/compile -j$BUILD_THREADS
          make target/install -j$BUILD_THREADS
          
          if [ $? -eq 0 ]; then
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
            echo "вң… зј–иҜ‘жҲҗеҠҹ"
          else
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
            echo "вқҢ зј–иҜ‘еӨұиҙҘ"
            exit 1
          fi

      - name: рҹ“Ұ ж”¶йӣҶдә§зү©
        if: env.BUILD_STATUS == 'success'
        run: |
          cd $BUILD_DIR/immortalwrt-source
          mkdir -p artifacts
          
          # еӨҚеҲ¶й•ңеғҸж–Үд»¶
          find bin/targets -name "*.vmdk" -exec cp {} artifacts/ \;
          find bin/targets -name "*.img" -exec cp {} artifacts/ \;
          find bin/targets -name "*.gz" -exec cp {} artifacts/ \;
          
          # еҲӣе»әж ЎйӘҢж–Үд»¶
          cd artifacts
          sha256sum * > sha256sums.txt
          echo "дә§зү©еҲ—иЎЁ:"
          ls -la

      - name: в¬ҶпёҸ дёҠдј дә§зү©
        if: env.BUILD_STATUS == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-esxi8-${{ needs.dependency-fix.outputs.build_id }}
          path: ${{ env.BUILD_DIR }}/immortalwrt-source/artifacts/*
          retention-days: 3

  post-build:
    needs: build-firmware
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: рҹ“Ҡ жһ„е»әжҠҘе‘Ҡ
        run: |
          echo "жһ„е»әе®ҢжҲҗзҠ¶жҖҒ: ${{ needs.build-firmware.result }}"
          echo "дҫқиө–зҠ¶жҖҒ: ${{ needs.dependency-fix.outputs.dep_status }}"
          echo "жһ„е»әID: ${{ needs.dependency-fix.outputs.build_id }}"
          
          if [ "${{ needs.build-firmware.result }}" = "success" ]; then
            echo "вң… жһ„е»әжҲҗеҠҹе®ҢжҲҗ"
            echo "дә§зү©е·ІдёҠдј еҲ°Artifacts"
          else
            echo "вқҢ жһ„е»әеӨұиҙҘ"
            echo "иҜ·жЈҖжҹҘзј–иҜ‘ж—Ҙеҝ—иҺ·еҸ–иҜҰз»ҶдҝЎжҒҜ"
          fi

      - name: рҹ§№ жңҖз»Ҳжё…зҗҶ
        run: |
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf /tmp/* /var/tmp/*
          df -h
