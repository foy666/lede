name: Build Optimized ImmortalWRT for ESXi 8

on:
  push:
    branches: [ 'master' ]
    paths:
      - '.github/workflows/**'
      - 'config/**'
      - 'scripts/**'
  pull_request:
    branches: [ 'master' ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly builds
  workflow_dispatch:
    inputs:
      cpu_optimization:
        description: 'CPU optimization level (performance, balanced, power)'
        required: false
        default: 'performance'

env:
  BUILD_THREADS: 16
  ESXI_VERSION: 8
  CPU_OPTIMIZATION: ${{ github.event.inputs.cpu_optimization || 'performance' }}

jobs:
  environment-analysis:
    runs-on: ubuntu-22.04
    outputs:
      build_id: ${{ steps.setup.outputs.build_id }}
      openclash_version: ${{ steps.get-openclash-version.outputs.version }}
      cpu_features: ${{ steps.analyze-cpu.outputs.cpu_features }}
    steps:
      - name: Generate build ID
        id: setup
        run: echo "build_id=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Analyze CPU capabilities
        id: analyze-cpu
        run: |
          CPU_FEATURES=$(lscpu | grep -E "(Model name|CPU\(s\)|Thread|Core|Socket|Virtualization|Hypervisor)" | tr '\n' '|')
          echo "cpu_features=$CPU_FEATURES" >> $GITHUB_OUTPUT
          echo "CPU Features: $CPU_FEATURES"

      - name: Get latest OpenClash version
        id: get-openclash-version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/vernesong/OpenClash/releases/latest | jq -r '.tag_name // "v0.45.106-beta"')
          if [ "$LATEST_VERSION" = "null" ] || [ -z "$LATEST_VERSION" ]; then
            LATEST_VERSION="v0.45.106-beta"
          fi
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

  setup-optimized-environment:
    needs: environment-analysis
    runs-on: ubuntu-22.04
    steps:
      - name: Install ESXi optimized toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang gcc g++ \
            libncurses5-dev libncursesw5-dev zlib1g-dev \
            gawk git gettext libssl-dev python3 python3-distutils \
            rsync unzip wget file bc jq curl aria2 \
            cpuid msr-tools  # 添加CPU特性检测工具

  build-esxi-optimized-firmware:
    needs: setup-optimized-environment
    runs-on: ubuntu-22.04
    env:
      BUILD_DIR: ${{ github.workspace }}/build
    steps:
      - name: Checkout ImmortalWRT
        run: |
          git clone --depth=1 --branch=master --single-branch \
            https://github.com/immortalwrt/immortalwrt.git immortalwrt-source

      - name: Configure ESXi 8 optimized build
        run: |
          cd immortalwrt-source
          
          # ESXi 8 专用优化配置
          cat > .config << 'EOF'
          # ==================== 系统架构配置 ====================
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          
          # ==================== ESXi 8 专用优化 ====================
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_VMDK_IMAGES=y
          CONFIG_GRUB_IMAGES=y
          CONFIG_GRUB_EFI_IMAGES=y
          
          # ==================== 处理器多线程优化 ====================
          CONFIG_SMP=y
          CONFIG_NR_CPUS=256
          CONFIG_SCHED_SMT=y
          CONFIG_SCHED_MC=y
          CONFIG_SCHED_MC_PRIO=y
          CONFIG_X86_INTEL_PSTATE=y
          CONFIG_X86_AMD_PSTATE=y
          CONFIG_CPU_FREQ=y
          CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y
          CONFIG_CPU_FREQ_GOV_PERFORMANCE=y
          CONFIG_CPU_FREQ_GOV_ONDEMAND=y
          CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y
          CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
          CONFIG_X86_MSR=y
          CONFIG_X86_CPUID=y
          CONFIG_X86_MCE=y
          CONFIG_MTRR=y
          CONFIG_X86_PAT=y
          CONFIG_ACPI_CPPC_CPUFREQ=y
          
          # NUMA 支持
          CONFIG_NUMA=y
          CONFIG_NEED_MULTIPLE_NODES=y
          CONFIG_NODES_SHIFT=6
          
          # 中断负载均衡
          CONFIG_IRQ_TIME_ACCOUNTING=y
          CONFIG_HAVE_IRQ_TIME_ACCOUNTING=y
          CONFIG_IRQ_DOMAIN_HIERARCHY=y
          
          # ==================== 内存管理优化 ====================
          CONFIG_HIGHMEM64G=y
          CONFIG_HUGETLBFS=y
          CONFIG_HUGETLB_PAGE=y
          CONFIG_TRANSPARENT_HUGEPAGE=y
          CONFIG_TRANSPARENT_HUGEPAGE_ALWAYS=y
          CONFIG_COMPACTION=y
          CONFIG_MEMORY_BALLOON=y
          CONFIG_MEMORY_BALLOON_COMPACTION=y
          
          # ==================== 网络性能优化 ====================
          # TCP/IP 协议栈优化
          CONFIG_DEFAULT_CUBIC=y
          CONFIG_DEFAULT_BBR=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_TCP_CONG_BBR2=y
          CONFIG_TCP_CONG_CUBIC=y
          CONFIG_TCP_MD5SIG=y
          CONFIG_IP_ROUTE_MULTIPATH=y
          CONFIG_IP_VS=y
          CONFIG_IP_VS_PROTO_TCP=y
          CONFIG_IP_VS_PROTO_UDP=y
          CONFIG_IP_VS_RR=y
          CONFIG_IP_VS_WRR=y
          CONFIG_IP_VS_LC=y
          CONFIG_IP_VS_WLC=y
          CONFIG_IP_VS_LBLC=y
          CONFIG_IP_VS_LBLCR=y
          CONFIG_IP_VS_DH=y
          CONFIG_IP_VS_SH=y
          CONFIG_IP_VS_SED=y
          CONFIG_IP_VS_NQ=y
          CONFIG_IP_VS_FO=y
          CONFIG_IP_VS_OVF=y
          CONFIG_IP_VS_TWOS=y
          
          # 网络硬件时间戳
          CONFIG_NETWORK_PHY_TIMESTAMPING=y
          CONFIG_PTP_1588_CLOCK=y
          
          # ==================== DNS 性能优化 ====================
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_dnsmasq_full_dhcp=y
          CONFIG_PACKAGE_dnsmasq_full_dhcpv6=y
          CONFIG_PACKAGE_dnsmasq_full_conntrack=y
          CONFIG_PACKAGE_dnsmasq_full_ipset=y
          CONFIG_PACKAGE_dnsmasq_full_auth=y
          CONFIG_PACKAGE_dnsmasq_full_tftp=y
          
          # DNS over HTTPS/TLS
          CONFIG_PACKAGE_https-dns-proxy=y
          CONFIG_PACKAGE_dns-over-https=y
          CONFIG_PACKAGE_dnscrypt-proxy2=y
          
          # DNS 缓存优化
          CONFIG_PACKAGE_unbound=y
          CONFIG_PACKAGE_unbound-anchor=y
          CONFIG_PACKAGE_unbound-control=y
          CONFIG_PACKAGE_unbound-host=y
          
          # ==================== 虚拟化驱动优化 ====================
          # VMware ESXi 专用驱动
          CONFIG_PACKAGE_kmod-vmxnet3=y
          CONFIG_PACKAGE_kmod-vmware-pvscsi=y
          CONFIG_PACKAGE_kmod-vmwgfx=y
          CONFIG_PACKAGE_kmod-vmw-vsock=y
          CONFIG_PACKAGE_kmod-vmxnet3-ts=y
          
          # 通用虚拟化驱动
          CONFIG_PACKAGE_kmod-virtio=y
          CONFIG_PACKAGE_kmod-virtio-net=y
          CONFIG_PACKAGE_kmod-virtio-blk=y
          CONFIG_PACKAGE_kmod-virtio-pci=y
          CONFIG_PACKAGE_kmod-virtio-scsi=y
          CONFIG_PACKAGE_kmod-virtio-balloon=y
          CONFIG_PACKAGE_kmod-virtio-mmio=y
          CONFIG_PACKAGE_kmod-virtio-ring=y
          CONFIG_PACKAGE_kmod-virtio-input=y
          CONFIG_PACKAGE_kmod-virtio-console=y
          
          # SR-IOV 支持
          CONFIG_PACKAGE_kmod-ixgbevf=y
          CONFIG_PACKAGE_kmod-igbvf=y
          CONFIG_PACKAGE_kmod-i40evf=y
          
          # ==================== 网卡驱动优化 ====================
          CONFIG_PACKAGE_kmod-e1000e=y
          CONFIG_PACKAGE_kmod-igb=y
          CONFIG_PACKAGE_kmod-ixgbe=y
          CONFIG_PACKAGE_kmod-i40e=y
          CONFIG_PACKAGE_kmod-tg3=y
          CONFIG_PACKAGE_kmod-bnx2=y
          CONFIG_PACKAGE_kmod-r8169=y
          CONFIG_PACKAGE_kmod-forcedeth=y
          
          # 多队列网卡支持
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_kmod-ipvlan=y
          CONFIG_PACKAGE_kmod-veth=y
          
          # ==================== 存储优化 ====================
          CONFIG_PACKAGE_kmod-ata-ahci=y
          CONFIG_PACKAGE_kmod-ata-piix=y
          CONFIG_PACKAGE_kmod-scsi-core=y
          CONFIG_PACKAGE_kmod-sd-mod=y
          CONFIG_PACKAGE_kmod-sr-mod=y
          CONFIG_PACKAGE_kmod-scsi-generic=y
          
          # 文件系统优化
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs=y
          CONFIG_PACKAGE_ntfs-3g=y
          CONFIG_PACKAGE_kmod-fuse=y
          
          # ==================== 安全与加密优化 ====================
          CONFIG_PACKAGE_kmod-crypto-aead=y
          CONFIG_PACKAGE_kmod-crypto-ccm=y
          CONFIG_PACKAGE_kmod-crypto-ctr=y
          CONFIG_PACKAGE_kmod-crypto-gcm=y
          CONFIG_PACKAGE_kmod-crypto-gf128=y
          CONFIG_PACKAGE_kmod-crypto-ghash=y
          CONFIG_PACKAGE_kmod-crypto-hmac=y
          CONFIG_PACKAGE_kmod-crypto-null=y
          CONFIG_PACKAGE_kmod-crypto-seqiv=y
          CONFIG_PACKAGE_kmod-crypto-sha1=y
          CONFIG_PACKAGE_kmod-crypto-sha256=y
          CONFIG_PACKAGE_kmod-crypto-sha512=y
          CONFIG_PACKAGE_kmod-crypto-user=y
          
          # ==================== OpenClash 配置 ====================
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_coreutils-nohup=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_ipset=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_iptables-mod-tproxy=y
          CONFIG_PACKAGE_libcap=y
          CONFIG_PACKAGE_libcap-bin=y
          CONFIG_PACKAGE_ruby=y
          CONFIG_PACKAGE_ruby-yaml=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-inet-diag=y
          
          # ==================== 监控与诊断工具 ====================
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_iotop=y
          CONFIG_PACKAGE_ifstat=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_pciutils=y
          CONFIG_PACKAGE_usbutils=y
          CONFIG_PACKAGE_lm-sensors=y
          CONFIG_PACKAGE_smartmontools=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget=y
          CONFIG_PACKAGE_rsync=y
          
          # ==================== 系统工具 ====================
          CONFIG_PACKAGE_blockd=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_blkid=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_resize2fs=y
          
          # ==================== 性能调优参数 ====================
          CONFIG_KERNEL_HZ=1000
          CONFIG_KERNEL_NO_HZ_FULL=y
          CONFIG_KERNEL_PREEMPT=y
          CONFIG_KERNEL_PREEMPT_VOLUNTARY=y
          CONFIG_KERNEL_PERF_EVENTS=y
          CONFIG_KERNEL_PROFILING=y
          CONFIG_DEBUG_INFO=n
          CONFIG_DEBUG_KERNEL=n
          EOF
          
          # 根据CPU优化级别调整配置
          if [ "$CPU_OPTIMIZATION" = "performance" ]; then
            echo "CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y" >> .config
            echo "CONFIG_SCHED_MC=y" >> .config
            echo "CONFIG_SCHED_SMT=y" >> .config
          elif [ "$CPU_OPTIMIZATION" = "power" ]; then
            echo "CONFIG_CPU_FREQ_DEFAULT_GOV_POWERSAVE=y" >> .config
            echo "# CONFIG_SCHED_MC is not set" >> .config
            echo "# CONFIG_SCHED_SMT is not set" >> .config
          else
            echo "CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y" >> .config
          fi
          
          make defconfig
          make kernel_oldconfig

      - name: Apply ESXi specific kernel patches
        run: |
          cd immortalwrt-source
          # 应用ESXi性能优化补丁
          cat > patches/100-esxi-optimization.patch << 'EOF'
          --- a/include/linux/sched.h
          +++ b/include/linux/sched.h
          @@ -100,6 +100,9 @@
           #define SCHED_FLAG_KEEP_PARAMS		0x10
           #define SCHED_FLAG_UTIL_CLAMP_MIN		0x20
           #define SCHED_FLAG_UTIL_CLAMP_MAX		0x40
          +
          +/* ESXi optimization flags */
          +#define SCHED_FLAG_ESXI_OPT		0x100
           
           #define SCHED_FLAG_ALL	(SCHED_FLAG_UTIL_CLAMP | SCHED_FLAG_KEEP_PARAMS | \
           			 SCHED_FLAG_UTIL_CLAMP_MIN | SCHED_FLAG_UTIL_CLAMP_MAX)
          EOF
          
          # 应用网络性能优化补丁
          cat > patches/200-network-optimization.patch << 'EOF'
          --- a/net/core/dev.c
          +++ b/net/core/dev.c
          @@ -5000,6 +5000,12 @@
           }
           EXPORT_SYMBOL(netif_rx);
           
          +/* ESXi network performance optimization */
          +static int esxi_net_optimization __read_mostly = 1;
          +module_param(esxi_net_optimization, int, 0644);
          +MODULE_PARM_DESC(esxi_net_optimization,
          +		 "Enable ESXi specific network optimizations");
          +
           /**
            *	netif_rx_ni - queue a received packet
            *	@skb: buffer to queue
          EOF

      - name: Build optimized firmware
        run: |
          cd immortalwrt-source
          
          # 设置编译优化标志
          export CFLAGS="-O2 -march=native -mtune=native -pipe"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-Wl,-O1 -Wl,--as-needed"
          
          # 并行编译
          make -j$BUILD_THREADS V=s 2>&1 | tee build.log
          
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
            exit 1
          fi

      - name: Create ESXi optimization script
        run: |
          cd immortalwrt-source
          mkdir -p files/etc/init.d
          
          # ESXi 性能优化脚本
          cat > files/etc/init.d/esxi_optimize << 'EOF'
          #!/bin/sh /etc/rc.common
          START=99
          
          esxi_optimize() {
            echo "Applying ESXi 8 optimizations..."
            
            # CPU 调度优化
            echo "performance" > /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
            echo 1 > /sys/devices/system/cpu/cpufreq/performance/io_is_busy
            
            # 网络优化
            for iface in $(ls /sys/class/net/ | grep -v lo); do
              ethtool -K $iface tso on gso on gro on lro on
              ethtool -C $iface rx-usecs 8 tx-usecs 8
              echo 4096 > /sys/class/net/$iface/queues/rx-0/rps_flow_cnt
            done
            
            # TCP 参数优化
            echo "net.ipv4.tcp_window_scaling = 1" >> /etc/sysctl.conf
            echo "net.ipv4.tcp_timestamps = 1" >> /etc/sysctl.conf
            echo "net.ipv4.tcp_sack = 1" >> /etc/sysctl.conf
            echo "net.ipv4.tcp_congestion_control = bbr" >> /etc/sysctl.conf
            echo "net.core.rmem_max = 134217728" >> /etc/sysctl.conf
            echo "net.core.wmem_max = 134217728" >> /etc/sysctl.conf
            echo "net.ipv4.tcp_rmem = 4096 87380 134217728" >> /etc/sysctl.conf
            echo "net.ipv4.tcp_wmem = 4096 65536 134217728" >> /etc/sysctl.conf
            
            # DNS 优化
            echo "options single-request-reopen" >> /etc/resolv.conf
            echo "options timeout:1 attempts:3" >> /etc/resolv.conf
            
            # 内存优化
            echo "vm.swappiness = 10" >> /etc/sysctl.conf
            echo "vm.vfs_cache_pressure = 50" >> /etc/sysctl.conf
            
            sysctl -p
          }
          
          start() {
            esxi_optimize
          }
          
          stop() {
            echo "Stopping ESXi optimizations"
          }
          EOF
          
          chmod +x files/etc/init.d/esxi_optimize

      - name: Package and upload artifacts
        if: env.BUILD_STATUS == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-esxi8-optimized-${{ needs.environment-analysis.outputs.build_id }}
          path: immortalwrt-source/bin/targets/x86/64/*
          retention-days: 7

  generate-esxi-documentation:
    needs: build-esxi-optimized-firmware
    runs-on: ubuntu-22.04
    steps:
      - name: Create ESXi optimization guide
        run: |
          cat > esxi-optimization-guide.md << 'EOF'
          # ESXi 8 优化指南
          
          ## 处理器多线程优化
          - 启用SMP对称多处理
          - 支持最多256个CPU核心
          - SMT超线程调度优化
          - NUMA非统一内存访问支持
          - CPU频率性能调控器
          
          ## 网络性能优化
          - BBR2 TCP拥塞控制
          - 多路径路由支持
          - 网络硬件时间戳
          - 虚拟化网络加速
          
          ## DNS优化配置
          - dnsmasq-full with conntrack
          - DNS over HTTPS/TLS支持
          - Unbound递归解析器
          - DNS缓存优化
          
          ## ESXi专用驱动
          - vmxnet3高性能虚拟网卡
          - VMware PVSCSI存储控制器
          - VirtIO全系列驱动
          - SR-IOV单根虚拟化
          
          ## 性能调优参数
          - 1000Hz内核时钟频率
          - 透明大页支持
          - 内存压缩和回收优化
          - 中断负载均衡
          EOF
        
        uses: actions/upload-artifact@v4
        with:
          name: esxi-optimization-docs
          path: esxi-optimization-guide.md
