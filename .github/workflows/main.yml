name: 🛠️ ImmortalWRT ESXi 8 Build with KMS & OpenClash

on:
  push:
    branches: ['main', 'master']
    paths:
      - '**.yml'
      - '**.yaml'
      - 'config/**'
      - 'scripts/**'
      - '!docs/**'

  workflow_dispatch:
    inputs:
      cpu_optimization:
        description: 'CPU优化级别 (performance/balanced/power)'
        required: false
        default: 'performance'
      clean_build:
        description: '是否执行清理构建'
        required: false
        default: 'false'

env:
  BUILD_THREADS: 8  # 减少线程数以节省内存
  ESXI_VERSION: 8
  CPU_OPTIMIZATION: ${{ github.event.inputs.cpu_optimization || 'performance' }}
  CLEAN_BUILD: ${{ github.event.inputs.clean_build || 'false' }}

jobs:
  disk-space-management:
    runs-on: ubuntu-22.04
    outputs:
      available_space: ${{ steps.check-space.outputs.available_space }}
    steps:
      - name: 💾 检查磁盘空间
        id: check-space
        run: |
          echo "=== 初始磁盘空间 ==="
          df -h
          
          # 计算可用空间
          AVAILABLE_KB=$(df / | awk 'NR==2 {print $4}')
          echo "available_space=$AVAILABLE_KB" >> $GITHUB_OUTPUT
          echo "可用空间: ${AVAILABLE_KB}KB"

      - name: 🧹 清理系统缓存
        run: |
          echo "清理系统缓存..."
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /tmp/*
          sudo rm -rf /var/tmp/*
          sudo rm -rf /var/cache/apt/archives/*.deb
          
          # 清理日志文件
          sudo find /var/log -name "*.log" -size +10M -delete
          sudo find /var/log -name "*.gz" -delete
          
          # 清理Docker缓存（如果存在）
          sudo docker system prune -af 2>/dev/null || true

      - name: 📊 清理后空间检查
        run: |
          echo "=== 清理后磁盘空间 ==="
          df -h
          echo "可用空间: $(df / | awk 'NR==2 {print $4}')"

  environment-setup:
    runs-on: ubuntu-22.04
    needs: disk-space-management
    outputs:
      build_id: ${{ steps.generate-id.outputs.build_id }}
    steps:
      - name: 📥 检出代码（浅克隆）
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
          lfs: false

      - name: 🆔 生成构建ID
        id: generate-id
        run: echo "build_id=build_$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

  build-optimized-firmware:
    runs-on: ubuntu-22.04
    needs: environment-setup
    timeout-minutes: 180  # 设置超时时间
    
    steps:
      - name: 💾 构建前空间检查
        run: |
          echo "=== 构建前磁盘空间 ==="
          df -h
          echo "可用空间: $(df / | awk 'NR==2 {print $4}')"

      - name: 📥 克隆ImmortalWRT（优化版）
        run: |
          echo "正在克隆ImmortalWRT（浅克隆）..."
          git clone --depth=1 --single-branch \
            --branch=master \
            https://github.com/immortalwrt/immortalwrt.git immortalwrt-source
          
          cd immortalwrt-source
          # 立即清理.git目录节省空间
          rm -rf .git
          echo "✅ 源码克隆完成，大小: $(du -sh .)"

      - name: ⚙️ 最小化配置
        run: |
          cd immortalwrt-source
          
          # 创建最小化配置
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_VMDK_IMAGES=y
          
          # KMS基础配置
          CONFIG_PACKAGE_vlmcsd=y
          CONFIG_PACKAGE_luci-app-vlmcsd=y
          
          # 处理器优化
          CONFIG_SMP=y
          CONFIG_NR_CPUS=16
          CONFIG_CPU_FREQ=y
          CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y
          
          # 网络基础
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_DEFAULT_BBR=y
          CONFIG_TCP_CONG_BBR=y
          
          # 虚拟化驱动
          CONFIG_PACKAGE_kmod-vmxnet3=y
          CONFIG_PACKAGE_kmod-virtio-net=y
          CONFIG_PACKAGE_kmod-virtio-blk=y
          
          # 最小化工具
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_tcpdump=y
          
          # 性能调优
          CONFIG_KERNEL_HZ=1000
          CONFIG_DEBUG_INFO=n
          CONFIG_DEBUG_KERNEL=n
          EOF

          make defconfig
          echo "✅ 最小化配置完成"

      - name: 🏗️ 分阶段编译
        run: |
          cd immortalwrt-source
          
          # 设置编译优化
          export CFLAGS="-Os -pipe"
          export CXXFLAGS="$CFLAGS"
          
          echo "开始分阶段编译..."
          
          # 第一阶段：编译工具链
          make tools/install -j$BUILD_THREADS
          make toolchain/install -j$BUILD_THREADS
          
          # 第二阶段：编译内核
          make target/linux/install -j$BUILD_THREADS
          
          # 第三阶段：编译包
          make package/compile -j$BUILD_THREADS
          
          # 第四阶段：编译镜像
          make target/install -j$BUILD_THREADS
          
          echo "✅ 编译完成"

      - name: 🧹 编译中清理
        run: |
          cd immortalwrt-source
          echo "编译中清理中间文件..."
          
          # 清理临时文件但保留必要文件
          find . -name "*.o" -delete
          find . -name "*.a" -delete
          find build_dir -name "*.tmp" -delete
          
          echo "清理后大小: $(du -sh .)"

      - name: 📦 收集产物
        run: |
          cd immortalwrt-source
          mkdir -p artifacts
          
          # 只收集必要的镜像文件
          find bin/targets -name "*.vmdk" -exec cp {} artifacts/ \;
          find bin/targets -name "*.img" -exec cp {} artifacts/ \;
          
          echo "产物大小: $(du -sh artifacts)"

      - name: ⬆️ 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-minimal-${{ needs.environment-setup.outputs.build_id }}
          path: immortalwrt-source/artifacts/*
          retention-days: 3

  post-cleanup:
    runs-on: ubuntu-22.04
    needs: [build-optimized-firmware, environment-setup]
    if: always()
    steps:
      - name: 🧹 最终清理
        run: |
          echo "执行最终清理..."
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /tmp/*
          sudo rm -rf ~/.cache/*
          
          # 清理Docker
          sudo docker system prune -af 2>/dev/null || true
          
          echo "=== 最终磁盘空间 ==="
          df -h
