name: Build ImmortalWRT for x86/ESXi with OpenClash

on:
  push:
    branches: [ 'master' ]
    paths:
      - '.github/workflows/**'
      - 'config/**'
      - 'scripts/**'
  pull_request:
    branches: [ 'master' ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly builds (Sunday at 00:00)
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Perform clean build'
        required: false
        default: 'false'

env:
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  BUILD_THREADS: 16

jobs:
  setup-environment:
    runs-on: ubuntu-22.04
    outputs:
      build_id: ${{ steps.setup.outputs.build_id }}
      openclash_version: ${{ steps.get-openclash-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Generate build ID
        id: setup
        run: echo "build_id=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Get latest OpenClash version
        id: get-openclash-version
        run: |
          # 使用更稳定的API查询方式获取最新版本
          LATEST_VERSION=$(curl -s https://api.github.com/repos/vernesong/OpenClash/releases/latest | jq -r '.tag_name // "v0.45.106-beta"')
          if [ "$LATEST_VERSION" = "null" ] || [ -z "$LATEST_VERSION" ]; then
            echo "警告: 无法从API获取最新版本，使用默认版本 v0.45.106-beta"
            LATEST_VERSION="v0.45.106-beta"
          fi
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "Using OpenClash version: $LATEST_VERSION"

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            gcc \
            g++ \
            libncurses5-dev \
            libncursesw5-dev \
            zlib1g-dev \
            gawk \
            git \
            gettext \
            libssl-dev \
            python3 \
            python3-distutils \
            rsync \
            unzip \
            wget \
            file \
            bc \
            jq \
            curl \
            aria2

  build-firmware:
    needs: setup-environment
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86/64]
    env:
      BUILD_DIR: ${{ github.workspace }}/build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout ImmortalWRT
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git immortalwrt-source
          cd immortalwrt-source
          git checkout master

      - name: Update feeds and install packages
        run: |
          cd immortalwrt-source
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 安装OpenClash依赖
          ./scripts/feeds install coreutils-nohup bash iptables dnsmasq-full curl ca-certificates ipset ip-full \
            iptables-mod-tproxy iptables-mod-extra libcap libcap-bin ruby ruby-yaml kmod-tun kmod-inet-diag

      - name: Download and prepare OpenClash
        run: |
          cd immortalwrt-source
          OPENCLASH_VERSION="${{ needs.setup-environment.outputs.openclash_version }}"
          echo "使用OpenClash版本: $OPENCLASH_VERSION"
          
          # 构建正确的下载URL
          OPENCLASH_URL="https://github.com/vernesong/OpenClash/releases/download/${OPENCLASH_VERSION}/luci-app-openclash_${OPENCLASH_VERSION}_all.ipk"
          echo "下载URL: $OPENCLASH_URL"
          
          # 创建package目录
          mkdir -p package/openclash
          
          # 下载并检查文件
          if wget --spider "$OPENCLASH_URL" 2>/dev/null; then
            echo "文件存在，开始下载..."
            wget -q --timeout=30 --tries=3 "$OPENCLASH_URL" -O package/openclash/openclash.ipk
            if [ $? -eq 0 ] && [ -s "package/openclash/openclash.ipk" ]; then
              echo "下载成功"
              # 添加OpenClash到编译配置
              echo "src-git openclash https://github.com/vernesong/OpenClash.git" >> feeds.conf.default
            else
              echo "警告: 下载失败，将从源码编译OpenClash"
              git clone https://github.com/vernesong/OpenClash.git package/openclash
            fi
          else
            echo "警告: IPK文件不存在，将从源码编译OpenClash"
            git clone https://github.com/vernesong/OpenClash.git package/openclash
          fi

      - name: Configure for x86/ESXi with OpenClash
        run: |
          cd immortalwrt-source
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          
          # OpenClash配置
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_coreutils-nohup=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_ipset=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_iptables-mod-tproxy=y
          CONFIG_PACKAGE_iptables-mod-extra=y
          CONFIG_PACKAGE_libcap=y
          CONFIG_PACKAGE_libcap-bin=y
          CONFIG_PACKAGE_ruby=y
          CONFIG_PACKAGE_ruby-yaml=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-inet-diag=y
          
          # Kernel configuration for ESXi
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_VMDK_IMAGES=y
          CONFIG_VDI_IMAGES=y
          CONFIG_VHDX_IMAGES=y
          
          # CPU optimization
          CONFIG_CPU_FREQ=y
          CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y
          CONFIG_CPU_FREQ_GOV_PERFORMANCE=y
          CONFIG_CPU_FREQ_GOV_ONDEMAND=y
          CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y
          CONFIG_X86_MSR=y
          CONFIG_X86_CPUID=y
          
          # Hardware support
          CONFIG_PCI=y
          CONFIG_PCIEPORTBUS=y
          CONFIG_HOTPLUG_PCI=y
          CONFIG_HOTPLUG_PCI_PCIE=y
          CONFIG_ACPI=y
          CONFIG_ACPI_CPU_FREQ_PSS=y
          CONFIG_DMI=y
          
          # Network drivers for ESXi passthrough
          CONFIG_PACKAGE_kmod-e1000e=y
          CONFIG_PACKAGE_kmod-e1000=y
          CONFIG_PACKAGE_kmod-igb=y
          CONFIG_PACKAGE_kmod-ixgbe=y
          CONFIG_PACKAGE_kmod-vmxnet3=y
          CONFIG_PACKAGE_kmod-r8125=y
          CONFIG_PACKAGE_kmod-r8168=y
          CONFIG_PACKAGE_kmod-forcedeth=y
          CONFIG_PACKAGE_kmod-tg3=y
          CONFIG_PACKAGE_kmod-bnx2=y
          
          # Storage drivers
          CONFIG_PACKAGE_kmod-ata-ahci=y
          CONFIG_PACKAGE_kmod-ata-piix=y
          CONFIG_PACKAGE_kmod-block2mtd=y
          CONFIG_PACKAGE_kmod-scsi-core=y
          CONFIG_PACKAGE_kmod-mptsas=y
          CONFIG_PACKAGE_kmod-mptspi=y
          
          # Virtualization support
          CONFIG_PACKAGE_kmod-virtio-balloon=y
          CONFIG_PACKAGE_kmod-virtio-net=y
          CONFIG_PACKAGE_kmod-virtio-pci=y
          CONFIG_PACKAGE_kmod-virtio-blk=y
          CONFIG_PACKAGE_kmod-virtio-scsi=y
          CONFIG_PACKAGE_kmod-virtio=y
          CONFIG_PACKAGE_kmod-virtio-mmio=y
          
          # Filesystems
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs=y
          CONFIG_PACKAGE_ntfs-3g=y
          
          # Performance tuning
          CONFIG_KERNEL_PERF_EVENTS=y
          CONFIG_KERNEL_HZ=1000
          CONFIG_KERNEL_NO_HZ_IDLE=y
          CONFIG_KERNEL_PREEMPT=y
          CONFIG_KERNEL_PREEMPT_VOLUNTARY=y
          
          # Network performance
          CONFIG_PACKAGE_kmod-tcp-bbr=y
          CONFIG_PACKAGE_kmod-nft-fullcone=y
          CONFIG_PACKAGE_kmod-nf-flow-table=y
          CONFIG_DEFAULT_TCP_CONG="bbr"
          
          # Additional tools
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_pciutils=y
          CONFIG_PACKAGE_usbutils=y
          CONFIG_PACKAGE_lm-sensors=y
          
          # Base system
          CONFIG_PACKAGE_blockd=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_blkid=y
          EOF

          # Apply configuration
          make defconfig
          make kernel_oldconfig

      - name: Build firmware
        run: |
          cd immortalwrt-source
          make -j$BUILD_THREADS V=s 2>&1 | tee build.log
          
          # Check build status
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
            exit 1
          fi

      - name: Collect artifacts
        if: env.BUILD_STATUS == 'success'
        run: |
          cd immortalwrt-source/bin/targets/x86/64/
          mkdir -p artifacts
          cp *.vmdk *.img *.gz *.manifest artifacts/
          
          # Create checksums
          cd artifacts
          sha256sum * > sha256sums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v3  # 使用v3版本避免下载问题:cite[2]
        with:
          name: immortalwrt-x86-esxi-openclash-${{ needs.setup-environment.outputs.build_id }}
          path: immortalwrt-source/bin/targets/x86/64/artifacts/*
          retention-days: 7

  optimize-performance:
    needs: build-firmware
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3  # 使用v3版本避免下载问题:cite[2]
        with:
          name: immortalwrt-x86-esxi-openclash-${{ needs.setup-environment.outputs.build_id }}

      - name: Analyze build size
        run: |
          echo "Build artifacts:"
          ls -la
          echo "File sizes:"
          du -h *

      - name: Generate build report
        run: |
          cat > build-report.md << EOF
          # ImmortalWRT x86/ESXi Build Report
          
          **Build ID:** ${{ needs.setup-environment.outputs.build_id }}
          **Build Date:** $(date)
          **GitHub Run:** ${{ github.run_id }}
          **OpenClash Version:** ${{ needs.setup-environment.outputs.openclash_version }}
          
          ## Included Features:
          - ESXi optimized kernel
          - OpenClash pre-installed
          - VMXNET3 driver support
          - Multiple NIC drivers for passthrough
          - CPU frequency scaling
          - BBR TCP congestion control
          - Performance monitoring tools
          
          ## Build Configuration:
          - Target: x86/64
          - Filesystem: EXT4 + SquashFS
          - Image Format: VMDK (ESXi compatible)
          
          ## Performance Optimizations:
          - 1000Hz kernel timer frequency
          - Preemptive kernel
          - CPU performance governor
          - BBR congestion control
          - Hardware acceleration support
          
          ## OpenClash Information:
          - Default control panel: Yacd (访问地址: http://路由器IP:9090)
          - Default password: 123456
          - Recommended use Fake-IP mode for better performance:cite[7]:cite[10]
          EOF

      - name: Upload build report
        uses: actions/upload-artifact@v3
        with:
          name: build-report-${{ needs.setup-environment.outputs.build_id }}
          path: build-report.md

  deploy-release:
    needs: [build-firmware, optimize-performance]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ needs.setup-environment.outputs.build_id }}
          name: ImmortalWRT x86/ESXi Build ${{ needs.setup-environment.outputs.build_id }}
          body: |
            Automated build of ImmortalWRT for x86/ESXi environments
            Includes OpenClash ${{ needs.setup-environment.outputs.openclash_version }} pre-installed
            Includes performance optimizations for virtualization
            
            ## OpenClash Default Settings:
            - Control Panel: Yacd (http://路由器IP:9090)
            - Default Password: 123456
            - Recommended to use Fake-IP mode:cite[7]:cite[10]
            
            ## Important Notes:
            - For best performance, use Fake-IP mode in OpenClash
            - Change default passwords after first login
            - Configure OpenClash subscription according to your provider
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
