name: OpenWrt x86 ESXi8.0 优化编译

on:
  push;
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检查代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils

      - name: 更新源码与Feeds
        run: |
          git pull origin main
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 应用ESXi优化配置
        run: |
          # 配置x86目标平台
          echo "CONFIG_TARGET_x86=y" > .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_Generic=y" >> .config
          
          # 内核优化
          echo "CONFIG_KERNEL_PATCHVER=6.12" >> .config  # 使用最新稳定内核
          echo "CONFIG_KERNEL_DEVMEM=y" >> .config
          echo "CONFIG_KERNEL_CPU_FREQ=y" >> .config
          echo "CONFIG_KERNEL_CPU_FREQ_GOV_PERFORMANCE=y" >> .config
          echo "CONFIG_KERNEL_HIGH_RES_TIMERS=y" >> .config
          echo "CONFIG_KERNEL_PREEMPT_NONE=y" >> .config  # 降低延迟
          
          # 网络优化
          echo "CONFIG_PACKAGE_kmod-vmxnet3=y" >> .config  # ESXi VMXNET3驱动
          echo "CONFIG_PACKAGE_kmod-e1000e=y" >> .config  # 英特尔网卡驱动
          echo "CONFIG_PACKAGE_kmod-igb=y" >> .config
          echo "CONFIG_PACKAGE_kmod-tg3=y"
          echo "CONFIG_PACKAGE_kmod-bnx2=y"
          echo "CONFIG_PACKAGE_kmod-iavf=y"
          echo "CONFIG_PACKAGE_kmod-mlx5-core=y"
          echo "CONFIG_PACKAGE_kmod-ath10k-ct=y"
          echo "CONFIG_PACKAGE_kmod-nft-offload=y" >> .config  # 硬件加速
          echo "CONFIG_PACKAGE_flowoffload=y" >> .config
          echo "CONFIG_PACKAGE_hwaccel=y" >> .config
          
          # 存储优化
          echo "CONFIG_PACKAGE_kmod-scsi-vmw_pvscsi=y" >> .config  # ESXi SCSI驱动
          echo "CONFIG_PACKAGE_kmod-ata-via=y" >> .config
          echo "CONFIG_PACKAGE_kmod-fs-ext4=y" >> .config
          echo "CONFIG_PACKAGE_kmod-fs-xfs=y" >> .config
          
          # 系统工具
          echo "CONFIG_PACKAGE_cpufrequtils=y" >> .config  # CPU频率控制
          echo "CONFIG_PACKAGE_irqbalance=y" >> .config  # 中断平衡
          echo "CONFIG_PACKAGE_lm-sensors=y" >> .config  # 硬件监控
          echo "CONFIG_PACKAGE_nmon=y" >> .config  # 系统监控
          echo "CONFIG_PACKAGE_openssh-server=y" >> .config
          
          # 优化编译选项
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=y" >> .config
          echo "CONFIG_EXTRA_OPTIMIZATION=\"-march=nehalem -mtune=skylake -fomit-frame-pointer\"" >> .config
          
          # 生成镜像格式 (ESXi支持的格式)
          echo "CONFIG_TARGET_IMAGES_QCOW2=y" >> .config
          echo "CONFIG_TARGET_IMAGES_VMDK=y" >> .config
          echo "CONFIG_GRUB_EFI_IMAGES=y" >> .config
          echo "CONFIG_ISO_IMAGES=y" >> .config

          # 应用配置
          make defconfig

      - name: 下载依赖包
        run: make download -j$(nproc)

      - name: 编译固件
        run: |
          make -j$(nproc) || make -j1 V=s  # 失败时单线程输出详细日志

      - name: 整理输出文件
        run: |
          mkdir -p ./esxi-images
          cp $(find ./bin/targets/ -name "*.vmdk") ./esxi-images/
          cp $(find ./bin/targets/ -name "*.qcow2") ./esxi-images/
          cp $(find ./bin/targets/ -name "*.iso") ./esxi-images/
          cp $(find ./bin/targets/ -name "*.img.gz") ./esxi-images/

      - name: 上传ESXi专用镜像
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-esxi8-optimized
          path: ./esxi-images/
